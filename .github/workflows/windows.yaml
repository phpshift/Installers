name: Compile and Push Installer

on:
  push:
    branches:
      - main
    paths:
      - "Windows/**"
      - "!Windows/phpshift-v1.0.0.exe"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: ./Windows

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Compile Executable
        run: |
          # Compiles the script inside the Windows directory and drops the .exe right there
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /O"." phpshift.iss

      - name: Commit and Push Changes
        run: |
          # 1. Set up the GitHub Actions bot identity
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 2. Stage the newly compiled executable
          # Note: Git commands run from the working-directory, but reference the repo root
          git add phpshift-v1.0.0.exe

          # 3. Check if the file actually changed to avoid empty commit errors
          if ($null -ne (git status --porcelain)) {
            $dateStr = Get-Date -Format "yyyy-MM-dd"
            git commit -m "Update PHPShift Installer $dateStr"
            git push
            Write-Host "Success: Installer compiled and pushed to main branch!"
          } else {
            Write-Host "Success: Build finished, but the executable is identical to the previous version. Nothing to push."
          }
